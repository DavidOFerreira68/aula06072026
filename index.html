<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAVID É O MAIOR!!!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background: linear-gradient(135deg, #ff00ff, #00ffff, #ffff00, #ff0000);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white;
            text-align: center;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h1 {
            font-size: 10rem;
            text-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 30px #ff0000, 0 0 40px #00ff00, 0 0 50px #0000ff;
            animation: glow 2s ease-in-out infinite alternate, bounce 1s infinite;
            margin-top: 20%;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 30px #ff0000, 0 0 40px #00ff00, 0 0 50px #0000ff; }
            to { text-shadow: 0 0 20px #fff, 0 0 30px #ff0000, 0 0 40px #00ff00, 0 0 50px #0000ff, 0 0 60px #ff00ff; }
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-30px); }
            60% { transform: translateY(-15px); }
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            animation: confettiFall 5s linear infinite;
        }

        @keyframes confettiFall {
            0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        .fireworks {
            position: absolute;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            box-shadow: 0 0 10px 5px;
            animation: firework 2s ease-out infinite;
        }

        @keyframes firework {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(1); opacity: 0; }
        }

        .david-image {
            width: 300px;
            height: 300px;
            border-radius: 50%;
            border: 10px solid gold;
            margin: 20px auto;
            animation: pulse 2s infinite, rotate 5s linear infinite;
            box-shadow: 0 0 50px gold;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        p {
            font-size: 2rem;
            margin-top: 20px;
            animation: colorChange 1s infinite;
        }

        @keyframes colorChange {
            0% { color: red; }
            25% { color: blue; }
            50% { color: green; }
            75% { color: yellow; }
            100% { color: purple; }
        }

        .emoji {
            font-size: 3rem;
            animation: bounceEmoji 1s infinite;
        }

        @keyframes bounceEmoji {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body>
    <h1>DAVID É O MAIOR!!!</h1>
    <div class="david-image" style="background: radial-gradient(circle, gold, orange);"></div>
    <p>O REI ABSOLUTO! O MELHOR DE TODOS! 👑🔥💥</p>
    <div class="emoji">🎉🎊🥳🎆💃🕺</div>

    <script>
        // Criar confetes
        for (let i = 0; i < 200; i++) {
            const confetti = document.createElement('div');
            confetti.classList.add('confetti');
            confetti.style.left = Math.random() * 100 + 'vw';
            confetti.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 50%)`;
            confetti.style.animationDuration = (Math.random() * 3 + 2) + 's';
            confetti.style.animationDelay = Math.random() * 5 + 's';
            document.body.appendChild(confetti);
        }

        // Criar fogos de artifício
        setInterval(() => {
            for (let i = 0; i < 5; i++) {
                const firework = document.createElement('div');
                firework.classList.add('fireworks');
                firework.style.left = Math.random() * 100 + 'vw';
                firework.style.top = Math.random() * 50 + 'vh';
                firework.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 50%)`;
                document.body.appendChild(firework);
                
                setTimeout(() => {
                    firework.remove();
                }, 2000);
            }
        }, 500);

        // Efeito de vibração
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth * 100;
            const y = e.clientY / window.innerHeight * 100;
            document.body.style.background = `radial-gradient(circle at ${x}% ${y}%, #ff00ff, #00ffff, #ffff00, #ff0000)`;
        });
    </script>
</body>
</html>
